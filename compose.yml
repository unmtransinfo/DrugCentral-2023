services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: unmtransinfo/drugcen-db:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    image: unmtransinfo/drugcen-web:latest
    env_file:
      - .env
    depends_on:
      - db
    expose:
      - "8000"

  nginx:
    build:
      context: ./nginx
    image: unmtransinfo/drugcen-nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  pgdata:
